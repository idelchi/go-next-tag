name: go-next-tag

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev
      - main
    tags:
      - "*"

jobs:
  # info:
  #   uses: idelchi/devenv/.github/workflows/info.yml@dev

  # verify:
  #   if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
  #   uses: idelchi/devenv/.github/workflows/task.yml@dev

  # test:
  #   if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
  #   # needs: verify
  #   strategy:
  #     matrix:
  #       os:
  #         - ubuntu-24.04
  #         # - windows-2022
  #         # - macos-14
  #   runs-on: ${{ matrix.os }}
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Set up Go
  #       uses: actions/setup-go@v5
  #       with:
  #         go-version: "1.23.2"
  #         check-latest: true

  #     - name: Test
  #       shell: sh
  #       run: |
  #         ./tests/go-next-tag.sh

  build:
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    # needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5

      - name: Build
        run: |
          go build ./cmd/go-next-tag
          chmod +x go-next-tag

      - name: Artifact to next-tag
        uses: actions/upload-artifact@v4
        with:
          name: go-next-tag
          path: go-next-tag
          retention-days: 1
          if-no-files-found: error
          overwrite: true

  calculate:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download go-next-tag (artifact)
        uses: actions/download-artifact@v4
        with:
          name: go-next-tag
          path: ~/.local/bin

      - name: Calculate Next Tag
        id: tag
        run: |
          chmod +x ~/.local/bin/go-next-tag
          go-next-tag --version

  # next-tag:
  #   uses: idelchi/devenv/.github/workflows/next-tag.yml@dev
