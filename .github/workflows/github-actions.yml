  #   permissions:
  #     contents: write
  #     actions: write
  #   with:
  #     tag: ${{ needs.next-tag.outputs.next }}-beta

  release:
    uses: idelchi/devenv/.github/workflows/gorelease.yml@dev
    if: startsWith(github.ref, 'refs/tags/')
    # needs: verify
    permissions:
      contents: write

  cleanup:
    uses: idelchi/devenv/.github/workflows/cleanup.yml@dev
    if: always()
    needs: release
    permissions:
      actions: write
